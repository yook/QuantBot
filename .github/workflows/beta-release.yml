name: Beta Release to Timeweb S3

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "windows, macos or both"
        required: true
        default: "both"
      release_notes:
        description: "Reserved for future metadata wiring; currently not sent to backend"
        required: false
        default: ""
      mandatory:
        description: "Mark release as mandatory"
        required: true
        default: "false"
      min_supported_version:
        description: "Optional minimum supported app version"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-windows:
    if: ${{ inputs.platforms == 'windows' || inputs.platforms == 'both' }}
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      file_name: ${{ steps.meta.outputs.file_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          VITE_CI_BUILD: "true"
        run: npm run build:win -- --publish never

      - name: Resolve artifact metadata
        id: meta
        shell: pwsh
        run: |
          $json = node scripts/find-release-artifact.cjs --platform windows --json | ConvertFrom-Json
          "version=$($json.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_name=beta-release-windows" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "file_name=$($json.fileName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Copy-Item -Path $json.artifactPath -Destination $json.fileName -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-release-windows
          path: ${{ steps.meta.outputs.file_name }}
          if-no-files-found: error

  build-macos:
    if: ${{ inputs.platforms == 'macos' || inputs.platforms == 'both' }}
    runs-on: macos-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      file_name: ${{ steps.meta.outputs.file_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build macOS installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ""
        run: npx electron-builder --mac --publish=never

      - name: Resolve artifact metadata
        id: meta
        run: |
          json=$(node scripts/find-release-artifact.cjs --platform macos --json)
          version=$(printf '%s' "$json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["version"])')
          file_name=$(printf '%s' "$json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["fileName"])')
          artifact_path=$(printf '%s' "$json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["artifactPath"])')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "artifact_name=beta-release-macos" >> "$GITHUB_OUTPUT"
          echo "file_name=$file_name" >> "$GITHUB_OUTPUT"
          cp "$artifact_path" "$file_name"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-release-macos
          path: ${{ steps.meta.outputs.file_name }}
          if-no-files-found: error

  publish-beta:
    name: Upload beta artifacts to Timeweb S3 and register releases
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    if: ${{ always() && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifact
        if: ${{ needs.build-windows.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: beta-release-windows
          path: dist/windows

      - name: Download macOS artifact
        if: ${{ needs.build-macos.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: beta-release-macos
          path: dist/macos

      - name: Install AWS CLI
        run: |
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi
          python3 -m pip install --user --upgrade awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure SSH key for release registration
        env:
          RELEASE_SSH_PRIVATE_KEY: ${{ secrets.RELEASE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$RELEASE_SSH_PRIVATE_KEY" > ~/.ssh/release_key
          chmod 600 ~/.ssh/release_key

      - name: Upload Windows beta artifact
        if: ${{ needs.build-windows.result == 'success' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_DOWNLOADS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_DOWNLOADS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ru-1
          S3_BUCKET: b9b6a5eb-48ad-4961-8fbf-6580993d369e
          S3_ENDPOINT: https://s3.twcstorage.ru
          VERSION: ${{ needs.build-windows.outputs.version }}
          MANDATORY: ${{ inputs.mandatory }}
          MIN_SUPPORTED_VERSION: ${{ inputs.min_supported_version }}
          RELEASE_SSH_HOST: ${{ secrets.RELEASE_SSH_HOST }}
          RELEASE_SSH_USER: ${{ secrets.RELEASE_SSH_USER }}
          RELEASE_API_CONTAINER: ${{ secrets.RELEASE_API_CONTAINER }}
        run: |
          set -euo pipefail
          api_container="${RELEASE_API_CONTAINER:-pageviewer-api}"
          artifact_path=$(find dist/windows -maxdepth 1 -type f | head -n 1)
          file_name=$(basename "$artifact_path")
          object_key="releases/windows/${VERSION}/${file_name}"
          checksum=$(sha256sum "$artifact_path" | awk '{print $1}')
          file_size=$(stat -c%s "$artifact_path")
          aws s3 cp "$artifact_path" "s3://${S3_BUCKET}/${object_key}" --endpoint-url "$S3_ENDPOINT"
          ssh -i ~/.ssh/release_key -o StrictHostKeyChecking=no "${RELEASE_SSH_USER}@${RELEASE_SSH_HOST}" \
            "docker exec ${api_container} node dist/cli/release-create.js --version ${VERSION} --platform windows --channel beta --s3-key ${object_key} --file-name ${file_name} --checksum ${checksum} --file-size-bytes ${file_size} --status active --mandatory ${MANDATORY} ${MIN_SUPPORTED_VERSION:+--min-supported-version ${MIN_SUPPORTED_VERSION}}"

      - name: Upload macOS beta artifact
        if: ${{ needs.build-macos.result == 'success' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_DOWNLOADS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_DOWNLOADS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ru-1
          S3_BUCKET: b9b6a5eb-48ad-4961-8fbf-6580993d369e
          S3_ENDPOINT: https://s3.twcstorage.ru
          VERSION: ${{ needs.build-macos.outputs.version }}
          MANDATORY: ${{ inputs.mandatory }}
          MIN_SUPPORTED_VERSION: ${{ inputs.min_supported_version }}
          RELEASE_SSH_HOST: ${{ secrets.RELEASE_SSH_HOST }}
          RELEASE_SSH_USER: ${{ secrets.RELEASE_SSH_USER }}
          RELEASE_API_CONTAINER: ${{ secrets.RELEASE_API_CONTAINER }}
        run: |
          set -euo pipefail
          api_container="${RELEASE_API_CONTAINER:-pageviewer-api}"
          artifact_path=$(find dist/macos -maxdepth 1 -type f | head -n 1)
          file_name=$(basename "$artifact_path")
          object_key="releases/macos/${VERSION}/${file_name}"
          checksum=$(sha256sum "$artifact_path" | awk '{print $1}')
          file_size=$(stat -c%s "$artifact_path")
          aws s3 cp "$artifact_path" "s3://${S3_BUCKET}/${object_key}" --endpoint-url "$S3_ENDPOINT"
          ssh -i ~/.ssh/release_key -o StrictHostKeyChecking=no "${RELEASE_SSH_USER}@${RELEASE_SSH_HOST}" \
            "docker exec ${api_container} node dist/cli/release-create.js --version ${VERSION} --platform macos --channel beta --s3-key ${object_key} --file-name ${file_name} --checksum ${checksum} --file-size-bytes ${file_size} --status active --mandatory ${MANDATORY} ${MIN_SUPPORTED_VERSION:+--min-supported-version ${MIN_SUPPORTED_VERSION}}"
